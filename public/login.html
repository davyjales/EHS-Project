<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login • EHS Project</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <a class="brand" href="/">
          <span class="brand-badge" aria-hidden="true"></span>
          <span>EHS Project</span>
        </a>
        <nav class="nav">
          <button id="themeToggle" class="btn btn-ghost" type="button">☀</button>
          <a class="btn" href="/">Início</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section class="card" style="max-width:560px;margin:0 auto">
        <div class="card-header">
          <div class="kicker">Acesso</div>
          <h1 class="title">Entrar</h1>
          <p class="subtitle">Login simples consumindo <span class="mono">POST /api/auth/login</span>.</p>
        </div>
        <div class="card-body">
          <div id="msg" style="display:none"></div>
          <form id="form" class="form" autocomplete="on">
            <label>
              Email
              <input name="email" type="email" required placeholder="voce@exemplo.com" />
            </label>
            <label>
              Senha
              <input name="password" type="password" required minlength="4" placeholder="••••••••" />
            </label>
            <button class="btn btn-primary" type="submit">Entrar</button>
            <div class="hint">
              Ainda não tem conta? <a href="/signup"><u>Cadastre-se</u></a>.
            </div>
          </form>
        </div>
      </section>
    </main>

    <script src="/js/common.js"></script>
    <script src="/js/login.js"></script>
  </body>
</html>
